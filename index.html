<title>TusaBots — Interactive Robot</title>
<style>
/* ===== CSS Custom Properties ===== */
:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #0d1117;
  --bg-card: rgba(15, 20, 35, 0.6);
  --accent-cyan: #00d4ff;
  --accent-blue: #4a6cf7;
  --accent-purple: #7b61ff;
  --accent-green: #00ff88;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --text-muted: #484f58;
  --glass-bg: rgba(13, 17, 23, 0.7);
  --glass-border: rgba(0, 212, 255, 0.15);
  --glow-cyan: 0 0 20px rgba(0, 212, 255, 0.3);
  --glow-blue: 0 0 20px rgba(74, 108, 247, 0.3);
  --radius: 16px;
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  overflow-x: hidden;
  min-height: 100vh;
}

/* ===== Animated Background ===== */
#bg-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
}

/* ===== Navigation ===== */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  background: var(--glass-bg);
  border-bottom: 1px solid var(--glass-border);
  padding: 0 2rem;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.nav-logo {
  font-size: 1.2rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}



/* ===== Sections ===== */
section {
  position: relative;
  z-index: 1;
  padding: 6rem 2rem 4rem;
  max-width: 1200px;
  margin: 0 auto;
}

/* ===== Hero ===== */
.hero {
  text-align: center;
  padding-top: 10rem;
  padding-bottom: 4rem;
}

.hero h1 {
  font-size: clamp(2rem, 5vw, 3.5rem);
  font-weight: 800;
  background: linear-gradient(135deg, #fff, var(--accent-cyan), var(--accent-blue));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 1rem;
  letter-spacing: -0.02em;
}

.hero p {
  font-size: clamp(1rem, 2.5vw, 1.25rem);
  color: var(--text-secondary);
  max-width: 600px;
  margin: 0 auto 3rem;
}



.robot-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2rem;
}



/* ===== Speech Bubble ===== */
.speech-bubble {
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  background: var(--bg-card);
  border: 1px solid var(--glass-border);
  border-radius: 16px 16px 16px 4px;
  padding: 1rem 1.5rem;
  max-width: 350px;
  min-height: 50px;
  display: flex;
  align-items: center;
  font-size: 0.95rem;
  color: var(--text-primary);
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.4s ease, transform 0.4s ease;
  position: relative;
}

.speech-bubble.visible {
  opacity: 1;
  transform: translateY(0);
}

.speech-bubble::after {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 20px;
  width: 16px;
  height: 8px;
  background: var(--bg-card);
  clip-path: polygon(0 0, 100% 0, 50% 100%);
}



/* ===== Robot SVG ===== */
.robot-stage {
  width: 100%;
  max-width: 500px;
  height: 420px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.robot-wrapper {
  position: relative;
  transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* Idle floating animation */
.robot-wrapper.idle {
  animation: idleFloat 3s ease-in-out infinite;
}

@keyframes idleFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* Robot SVG styles */
.robot-svg { width: 260px; height: 374px; filter: drop-shadow(0 10px 30px rgba(0, 212, 255, 0.2)); }

/* Eye glow pulse */
.robot-eye {
  animation: eyePulse 2s ease-in-out infinite;
}

@keyframes eyePulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

/* Antenna blink */
.antenna-light {
  animation: antennaBlink 1.5s ease-in-out infinite;
}

@keyframes antennaBlink {
  0%, 100% { fill: var(--accent-cyan); filter: drop-shadow(0 0 6px var(--accent-cyan)); }
  50% { fill: var(--accent-purple); filter: drop-shadow(0 0 6px var(--accent-purple)); }
}





/* ===== Footer ===== */
footer {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 3rem 2rem;
  color: var(--text-muted);
  font-size: 0.85rem;
  border-top: 1px solid var(--glass-border);
}



/* ===== Login Button ===== */

  border: none;
  padding: 0.45rem 1.2rem;
  border-radius: 20px;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
  transition: all var(--transition);
  font-family: inherit;
}

.nav-login-btn:hover {
  transform: translateY(-2px);
  box-shadow: var(--glow-cyan);
}

.nav-login-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

.nav-user {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  font-size: 0.9rem;
  color: var(--text-secondary);
}

.nav-user-email {
  color: var(--text-primary);
  font-weight: 500;
  max-width: 180px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.nav-logout-btn {
  background: transparent;
  color: var(--text-secondary);
  border: 1px solid var(--glass-border);
  padding: 0.4rem 0.9rem;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: all var(--transition);
}

.nav-logout-btn:hover {

}

/* ===== Auth Modal ===== */
.modal-backdrop {

  inset: 0;

  background: rgba(5, 8, 15, 0.75);
  backdrop-filter: blur(8px);

}

.modal-backdrop.visible { display: flex; }

.modal {

  right: 0.75rem;

  border: none;
  color: var(--text-muted);
  font-size: 1.5rem;
  line-height: 1;
  cursor: pointer;

.modal-close:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }

  margin-bottom: 0.3rem;

}

.modal-subtitle {

  background: rgba(255,255,255,0.03);
  padding: 0.25rem;

  margin-bottom: 1.25rem;

.tab {

  color: var(--text-secondary);
  padding: 0.5rem;
  border-radius: 8px;
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: all var(--transition);
}

.tab.active {
  background: rgba(0, 212, 255, 0.12);
  color: var(--accent-cyan);
}

.form-group { margin-bottom: 0.85rem; }

.form-group label {
  display: block;
  font-size: 0.8rem;
  color: var(--text-secondary);
  margin-bottom: 0.35rem;
}

.form-input {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--glass-border);
  border-radius: 10px;
  padding: 0.7rem 0.9rem;
  color: var(--text-primary);
  font-size: 0.95rem;

  transition: border-color var(--transition), box-shadow var(--transition);

  box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
}

.submit-btn {

  background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
  color: #fff;
  border: none;
  padding: 0.75rem;
  border-radius: 10px;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  margin-top: 0.5rem;
  transition: all var(--transition);
}

.submit-btn:hover:not(:disabled) {

  box-shadow: var(--glow-cyan);
}

.submit-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.form-message {
  margin-top: 0.85rem;
  padding: 0.6rem 0.8rem;
  border-radius: 8px;
  font-size: 0.85rem;
  display: none;
}

.form-message.error {
  display: block;
  background: rgba(255, 80, 80, 0.1);
  border: 1px solid rgba(255, 80, 80, 0.25);
  color: #ff8a8a;

  background: rgba(0, 255, 136, 0.08);
  border: 1px solid rgba(0, 255, 136, 0.25);
  color: var(--accent-green);

/* ===== Responsive ===== */

  nav { padding: 0 1rem; }

  .hero { padding-top: 7rem; }
  .robot-stage { height: 360px; }
  .robot-svg { width: 200px; height: 288px; }
}
</style>

<script>
/* ===== Background Particle System ===== */
(function initBackground() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  const PARTICLE_COUNT = 60;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  class Particle {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height;
      this.size = Math.random() * 2 + 0.5;
      this.speedX = (Math.random() - 0.5) * 0.3;
      this.speedY = (Math.random() - 0.5) * 0.3;
      this.opacity = Math.random() * 0.5 + 0.1;
      this.pulse = Math.random() * Math.PI * 2;
    }
    update() {
      this.x += this.speedX;
      this.y += this.speedY;
      this.pulse += 0.02;
      if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
    }
    draw() {
      const o = this.opacity + Math.sin(this.pulse) * 0.15;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(0, 212, 255, ${Math.max(0, o)})`;
      ctx.fill();
    }
  }

  for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => { p.update(); p.draw(); });

    // Draw faint connections
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 120) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(0, 212, 255, ${0.06 * (1 - dist / 120)})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(animate);
  }
  animate();
})();

/* ===== Speech Bubble Rotate ===== */
(function initSpeechRotation() {
  const messages = [
    "Hi there! I'm TusaBot ✨",
    "Log in to start chatting! 🚀",
    "Your AI companion awaits 🤖",
    "Built to help, ready to learn 🧠"
  ];
  const textEl = document.getElementById('speech-text');
  const bubble = document.getElementById('speech-bubble');
  let i = 0;

  // Show first message
  setTimeout(() => bubble.classList.add('visible'), 600);

  setInterval(() => {
    i = (i + 1) % messages.length;
    bubble.classList.remove('visible');
    setTimeout(() => {
      textEl.textContent = messages[i];
      bubble.classList.add('visible');
    }, 400);
  }, 5000);
})();
</script>

<script type="module">
import {
  login,
  signup,
  logout,
  getUser,
  handleAuthCallback,
  onAuthChange,
  AUTH_EVENTS,
  AuthError,
  MissingIdentityError,
} from 'https://esm.sh/@netlify/identity@1?bundle';

const navAuth = document.getElementById('nav-auth');
const openBtn = document.getElementById('open-login-btn');
const modal = document.getElementById('auth-modal');
const closeBtn = document.getElementById('modal-close');
const tabLogin = document.getElementById('tab-login');
const tabSignup = document.getElementById('tab-signup');
const form = document.getElementById('auth-form');
const submitBtn = document.getElementById('submit-btn');
const formMessage = document.getElementById('form-message');
const nameGroup = document.getElementById('name-group');
const nameInput = document.getElementById('name');
const emailInput = document.getElementById('email');
const passwordInput = document.getElementById('password');
const authTitle = document.getElementById('auth-title');
const authSubtitle = document.getElementById('auth-subtitle');

let mode = 'login';

function setMode(next) {
  mode = next;
  if (mode === 'login') {
    tabLogin.classList.add('active');
    tabLogin.setAttribute('aria-selected', 'true');
    tabSignup.classList.remove('active');
    tabSignup.setAttribute('aria-selected', 'false');
    nameGroup.style.display = 'none';
    nameInput.required = false;
    submitBtn.textContent = 'Log In';
    authTitle.textContent = 'Welcome back';
    authSubtitle.textContent = 'Log in to access your TusaBot';
    passwordInput.autocomplete = 'current-password';
  } else {
    tabSignup.classList.add('active');
    tabSignup.setAttribute('aria-selected', 'true');
    tabLogin.classList.remove('active');
    tabLogin.setAttribute('aria-selected', 'false');
    nameGroup.style.display = '';
    nameInput.required = true;
    submitBtn.textContent = 'Create account';
    authTitle.textContent = 'Create your account';
    authSubtitle.textContent = 'Sign up to start chatting with your TusaBot';
    passwordInput.autocomplete = 'new-password';
  }
  clearMessage();
}

function showMessage(text, type) {
  formMessage.textContent = text;
  formMessage.className = 'form-message ' + type;
}

function clearMessage() {
  formMessage.textContent = '';
  formMessage.className = 'form-message';
}

function openModal() {
  modal.classList.add('visible');
  setTimeout(() => emailInput.focus(), 50);
}

function closeModal() {
  modal.classList.remove('visible');
  form.reset();
  clearMessage();
  setMode('login');
}

function renderLoggedIn(user) {
  const label = user.email || 'Account';
  navAuth.innerHTML = `
    <div class="nav-user">
      <span class="nav-user-email" title="${label}">${label}</span>
      <a href="dashboard.html" class="nav-login-btn">Dashboard</a>
      <button class="nav-logout-btn" id="logout-btn">Log out</button>
    </div>
  `;
  document.getElementById('logout-btn').addEventListener('click', async () => {
    try {
      await logout();
    } catch (err) {
      console.warn('Logout error', err);
    }
    renderLoggedOut();
  });
}

function renderLoggedOut() {
  navAuth.innerHTML = `<button class="nav-login-btn" id="open-login-btn">Login</button>`;
  document.getElementById('open-login-btn').addEventListener('click', openModal);
}

function describeError(error) {
  if (error instanceof MissingIdentityError) {
    return 'Identity is not enabled yet. The site owner needs to enable Identity in the Netlify dashboard.';
  }
  if (error instanceof AuthError) {
    switch (error.status) {
      case 401: return 'Invalid email or password.';
      case 403: return 'Signups are not allowed. Ask the site owner for an invite.';
      case 404: return 'Account not found.';
      case 422: return 'Please check your email and password (min 6 characters).';
      default: return error.message || 'Something went wrong. Please try again.';
    }
  }
  return 'Something went wrong. Please try again.';
}

openBtn.addEventListener('click', openModal);
closeBtn.addEventListener('click', closeModal);
modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && modal.classList.contains('visible')) closeModal();
});
tabLogin.addEventListener('click', () => setMode('login'));
tabSignup.addEventListener('click', () => setMode('signup'));

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  clearMessage();
  const email = emailInput.value.trim();
  const password = passwordInput.value;
  if (!email || !password) return;

  submitBtn.disabled = true;
  const originalLabel = submitBtn.textContent;
  submitBtn.textContent = mode === 'login' ? 'Logging in…' : 'Creating account…';

  try {
    if (mode === 'login') {
      const user = await login(email, password);
      showMessage(`Welcome back, ${user.name || user.email}!`, 'success');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 400);
    } else {
      const name = nameInput.value.trim();
      const user = await signup(email, password, name ? { full_name: name } : undefined);
      if (user.emailVerified) {
        showMessage('Account created. Redirecting…', 'success');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 600);
      } else {
        showMessage('Account created — check your email to confirm before logging in.', 'success');
        setMode('login');
      }
    }
  } catch (error) {
    showMessage(describeError(error), 'error');
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = originalLabel;
  }
});

onAuthChange((event, user) => {
  if (event === AUTH_EVENTS.LOGIN || event === AUTH_EVENTS.USER_UPDATED) {
    if (user) renderLoggedIn(user);
  } else if (event === AUTH_EVENTS.LOGOUT) {
    renderLoggedOut();
  }
});

(async function bootstrap() {
  try {
    await handleAuthCallback();
  } catch (error) {
    console.warn('Auth callback error', error);
  }
  try {
    const user = await getUser();
    if (user) renderLoggedIn(user);
    else renderLoggedOut();
  } catch (error) {
    if (error instanceof MissingIdentityError) {
      navAuth.innerHTML = `<button class="nav-login-btn" id="open-login-btn">Login</button>`;
      const btn = document.getElementById('open-login-btn');
      btn.addEventListener('click', () => {
        openModal();
        showMessage('Identity is not enabled on this site yet. Enable it in the Netlify dashboard to log in.', 'error');
      });
    } else {
      renderLoggedOut();
    }
  }
})();
</script>


</body></html>
