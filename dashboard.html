<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TusaBots — Dashboard</title>
<style>
:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #0d1117;
  --bg-card: rgba(15, 20, 35, 0.6);
  --accent-cyan: #00d4ff;
  --accent-blue: #4a6cf7;
  --accent-purple: #7b61ff;
  --accent-green: #00ff88;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --text-muted: #484f58;
  --glass-bg: rgba(13, 17, 23, 0.7);
  --glass-border: rgba(0, 212, 255, 0.15);
  --glow-cyan: 0 0 20px rgba(0, 212, 255, 0.3);
  --radius: 16px;
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Nav */
nav {
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  background: var(--glass-bg);
  border-bottom: 1px solid var(--glass-border);
  padding: 0 2rem;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.nav-logo {
  font-size: 1.2rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-decoration: none;
}

.nav-back {
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 0.9rem;
  transition: color var(--transition);
}

.nav-back:hover { color: var(--accent-cyan); }

.nav-actions {
  display: flex;
  align-items: center;
  gap: 0.85rem;
}

.nav-user-email {
  color: var(--text-secondary);
  font-size: 0.9rem;
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.nav-logout-btn {
  background: transparent;
  color: var(--text-secondary);
  border: 1px solid var(--glass-border);
  padding: 0.4rem 0.9rem;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: all var(--transition);
}

.nav-logout-btn:hover {
  color: var(--text-primary);
  border-color: var(--accent-cyan);
}

/* Dashboard Content */
.dashboard {
  flex: 1;
  max-width: 800px;
  width: 100%;
  margin: 0 auto;
  padding: 3rem 2rem;
  display: flex;
  flex-direction: column;
  gap: 2rem;
}

.dashboard-header {
  text-align: center;
}

.dashboard-header h1 {
  font-size: clamp(1.5rem, 4vw, 2.2rem);
  font-weight: 800;
  background: linear-gradient(135deg, #fff, var(--accent-cyan), var(--accent-blue));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 0.4rem;
}

.dashboard-header p {
  color: var(--text-secondary);
  font-size: 1rem;
}

/* Chat Area */
.chat-container {
  flex: 1;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  background: var(--bg-card);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  min-height: 400px;
}

.chat-messages {
  flex: 1;
  padding: 1.5rem;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.chat-placeholder {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  font-size: 0.95rem;
  text-align: center;
  padding: 2rem;
}

.chat-placeholder span {
  background: rgba(0, 212, 255, 0.06);
  border: 1px solid rgba(0, 212, 255, 0.12);
  border-radius: 12px;
  padding: 1rem 2rem;
}

.chat-bubble {
  max-width: 75%;
  padding: 0.75rem 1.1rem;
  border-radius: 14px;
  font-size: 0.95rem;
  line-height: 1.5;
}

.chat-bubble.bot {
  align-self: flex-start;
  background: rgba(0, 212, 255, 0.08);
  border: 1px solid rgba(0, 212, 255, 0.15);
  color: var(--text-primary);
}

.chat-bubble.user {
  align-self: flex-end;
  background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
  color: #fff;
}

/* Input */
.chat-input-area {
  display: flex;
  gap: 0.75rem;
  padding: 1rem 1.5rem;
  border-top: 1px solid var(--glass-border);
}

.chat-input {
  flex: 1;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  padding: 0.75rem 1rem;
  color: var(--text-primary);
  font-size: 0.95rem;
  font-family: inherit;
  outline: none;
  transition: border-color var(--transition), box-shadow var(--transition);
}

.chat-input::placeholder { color: var(--text-muted); }
.chat-input:focus { border-color: var(--accent-cyan); box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1); }

.chat-send-btn {
  background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
  border: none;
  border-radius: 12px;
  padding: 0.75rem 1.4rem;
  color: #fff;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: transform var(--transition), box-shadow var(--transition);
}

.chat-send-btn:hover { transform: translateY(-2px); box-shadow: var(--glow-cyan); }
.chat-send-btn:active { transform: translateY(0); }

/* Footer */
footer {
  text-align: center;
  padding: 2rem;
  color: var(--text-muted);
  font-size: 0.85rem;
  border-top: 1px solid var(--glass-border);
}

@media (max-width: 768px) {
  nav { padding: 0 1rem; }
  .dashboard { padding: 2rem 1rem; }
  .chat-input-area { flex-direction: column; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">🤖 TusaBots</a>
  <div class="nav-actions">
    <span class="nav-user-email" id="nav-user-email"></span>
    <button class="nav-logout-btn" id="logout-btn" type="button">Log out</button>
  </div>
</nav>

<main class="dashboard">
  <div class="dashboard-header">
    <h1>Your TusaBot</h1>
    <p>Your personal AI assistant</p>
  </div>

  <div class="chat-container">
    <div class="chat-messages" id="chat-messages">
      <div class="chat-placeholder" id="chat-placeholder">
        <span>🤖 Your bot is ready</span>
      </div>
    </div>
    <div class="chat-input-area">
      <input type="text" class="chat-input" id="chat-input" placeholder="Type a message..." autocomplete="off">
      <button class="chat-send-btn" id="chat-send" onclick="sendMessage()">Send</button>
    </div>
  </div>
</main>

<footer>
  <p>TusaBots © 2026</p>
</footer>

<script>
const messagesEl = document.getElementById('chat-messages');
const placeholder = document.getElementById('chat-placeholder');
const input = document.getElementById('chat-input');

const botReplies = [
  "I'm here! This is a placeholder — full AI coming soon. 🚀",
  "Great question! Backend integration is on the way. ✨",
  "Beep boop! I can't think yet, but I will soon. 🤖",
  "Stay tuned — real conversations are coming! 🌟",
  "Noted! Once I'm connected, I'll be much smarter. 🧠"
];

function addBubble(text, type) {
  if (placeholder) placeholder.remove();
  const div = document.createElement('div');
  div.className = 'chat-bubble ' + type;
  div.textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function sendMessage() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addBubble(text, 'user');
  setTimeout(() => {
    addBubble(botReplies[Math.floor(Math.random() * botReplies.length)], 'bot');
  }, 600);
}

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendMessage();
});
</script>

<script type="module">
import {
  getUser,
  logout,
  handleAuthCallback,
  onAuthChange,
  AUTH_EVENTS,
  MissingIdentityError,
} from 'https://esm.sh/@netlify/identity@1?bundle';

const emailEl = document.getElementById('nav-user-email');
const logoutBtn = document.getElementById('logout-btn');
const headerEl = document.querySelector('.dashboard-header h1');

logoutBtn.addEventListener('click', async () => {
  logoutBtn.disabled = true;
  try {
    await logout();
  } catch (err) {
    console.warn('Logout error', err);
  }
  window.location.href = 'index.html';
});

onAuthChange((event) => {
  if (event === AUTH_EVENTS.LOGOUT) {
    window.location.href = 'index.html';
  }
});

(async function gate() {
  try {
    await handleAuthCallback();
    const user = await getUser();
    if (!user) {
      window.location.href = 'index.html';
      return;
    }
    const label = user.user_metadata?.full_name || user.email || 'Account';
    emailEl.textContent = user.email || '';
    if (headerEl) headerEl.textContent = `Hi ${label.split('@')[0]}`;
  } catch (error) {
    if (error instanceof MissingIdentityError) {
      emailEl.textContent = 'Identity not enabled';
      return;
    }
    console.warn('Auth check failed', error);
    window.location.href = 'index.html';
  }
})();
</script>

</body>
</html>
