<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TusaBots — Dashboard</title>
<style>
:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #0d1117;
  --bg-card: rgba(15, 20, 35, 0.6);
  --accent-cyan: #00d4ff;
  --accent-blue: #4a6cf7;
  --accent-purple: #7b61ff;
  --accent-green: #00ff88;
  --accent-red: #ff4d6d;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --text-muted: #484f58;
  --glass-bg: rgba(13, 17, 23, 0.7);
  --glass-border: rgba(0, 212, 255, 0.15);
  --glow-cyan: 0 0 20px rgba(0, 212, 255, 0.3);
  --radius: 16px;
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Nav */
nav {
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  background: var(--glass-bg);
  border-bottom: 1px solid var(--glass-border);
  padding: 0 2rem;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.nav-logo {
  font-size: 1.2rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-decoration: none;
}

.nav-right { display: flex; align-items: center; gap: 1.25rem; }

.nav-back {
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 0.9rem;
  transition: color var(--transition);
}

.nav-back:hover { color: var(--accent-cyan); }

.nav-user {
  font-size: 0.85rem;
  color: var(--text-secondary);
}

.nav-user strong { color: var(--accent-cyan); font-weight: 600; }

.nav-logout {
  background: transparent;
  border: 1px solid var(--glass-border);
  color: var(--text-secondary);
  padding: 0.4rem 0.9rem;
  border-radius: 18px;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all var(--transition);
}

.nav-logout:hover {
  color: var(--accent-red);
  border-color: var(--accent-red);
}

/* Dashboard Content */
.dashboard {
  flex: 1;
  max-width: 800px;
  width: 100%;
  margin: 0 auto;
  padding: 3rem 2rem;
  display: flex;
  flex-direction: column;
  gap: 2rem;
}

.dashboard-header {
  text-align: center;
}

.dashboard-header h1 {
  font-size: clamp(1.5rem, 4vw, 2.2rem);
  font-weight: 800;
  background: linear-gradient(135deg, #fff, var(--accent-cyan), var(--accent-blue));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 0.4rem;
}

.dashboard-header p {
  color: var(--text-secondary);
  font-size: 1rem;
}

/* Login Card */
.login-card {
  max-width: 420px;
  width: 100%;
  margin: 2rem auto;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  background: var(--bg-card);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 2.5rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.login-card h2 {
  font-size: 1.4rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-align: center;
}

.login-card .subtitle {
  text-align: center;
  color: var(--text-secondary);
  font-size: 0.9rem;
  margin-bottom: 0.5rem;
}

.login-field {
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
}

.login-field label {
  font-size: 0.8rem;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-weight: 600;
}

.login-field input {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  padding: 0.75rem 1rem;
  color: var(--text-primary);
  font-size: 0.95rem;
  font-family: inherit;
  outline: none;
  transition: border-color var(--transition), box-shadow var(--transition);
}

.login-field input:focus {
  border-color: var(--accent-cyan);
  box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
}

.login-submit {
  background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
  border: none;
  border-radius: 12px;
  padding: 0.85rem 1.4rem;
  color: #fff;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: transform var(--transition), box-shadow var(--transition);
  margin-top: 0.5rem;
}

.login-submit:hover { transform: translateY(-2px); box-shadow: var(--glow-cyan); }
.login-submit:active { transform: translateY(0); }
.login-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

.login-error {
  color: var(--accent-red);
  font-size: 0.85rem;
  text-align: center;
  min-height: 1.2em;
}

.login-forgot {
  background: none;
  border: none;
  color: var(--text-secondary);
  font-size: 0.85rem;
  cursor: pointer;
  text-align: center;
  text-decoration: underline;
  margin-top: 0.25rem;
  font-family: inherit;
}

.login-forgot:hover { color: var(--accent-cyan); }

.login-info {
  text-align: center;
  color: var(--text-muted);
  font-size: 0.8rem;
  margin-top: 0.5rem;
  line-height: 1.5;
}

/* Chat Area */
.chat-container {
  flex: 1;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  background: var(--bg-card);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  min-height: 400px;
}

.chat-messages {
  flex: 1;
  padding: 1.5rem;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.chat-placeholder {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  font-size: 0.95rem;
  text-align: center;
  padding: 2rem;
}

.chat-placeholder span {
  background: rgba(0, 212, 255, 0.06);
  border: 1px solid rgba(0, 212, 255, 0.12);
  border-radius: 12px;
  padding: 1rem 2rem;
}

.chat-bubble {
  max-width: 75%;
  padding: 0.75rem 1.1rem;
  border-radius: 14px;
  font-size: 0.95rem;
  line-height: 1.5;
}

.chat-bubble.bot {
  align-self: flex-start;
  background: rgba(0, 212, 255, 0.08);
  border: 1px solid rgba(0, 212, 255, 0.15);
  color: var(--text-primary);
}

.chat-bubble.user {
  align-self: flex-end;
  background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
  color: #fff;
}

/* Input */
.chat-input-area {
  display: flex;
  gap: 0.75rem;
  padding: 1rem 1.5rem;
  border-top: 1px solid var(--glass-border);
}

.chat-input {
  flex: 1;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  padding: 0.75rem 1rem;
  color: var(--text-primary);
  font-size: 0.95rem;
  font-family: inherit;
  outline: none;
  transition: border-color var(--transition), box-shadow var(--transition);
}

.chat-input::placeholder { color: var(--text-muted); }
.chat-input:focus { border-color: var(--accent-cyan); box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1); }

.chat-send-btn {
  background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
  border: none;
  border-radius: 12px;
  padding: 0.75rem 1.4rem;
  color: #fff;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: transform var(--transition), box-shadow var(--transition);
}

.chat-send-btn:hover { transform: translateY(-2px); box-shadow: var(--glow-cyan); }
.chat-send-btn:active { transform: translateY(0); }

/* Loading state */
.loading {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  font-size: 0.95rem;
}

.hidden { display: none !important; }

/* Footer */
footer {
  text-align: center;
  padding: 2rem;
  color: var(--text-muted);
  font-size: 0.85rem;
  border-top: 1px solid var(--glass-border);
}

@media (max-width: 768px) {
  nav { padding: 0 1rem; }
  .dashboard { padding: 2rem 1rem; }
  .chat-input-area { flex-direction: column; }
  .login-card { padding: 1.75rem; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">🤖 TusaBots</a>
  <div class="nav-right">
    <span id="nav-user" class="nav-user hidden">Signed in as <strong id="nav-user-email"></strong></span>
    <button id="nav-logout" class="nav-logout hidden" type="button">Log out</button>
    <a href="index.html" class="nav-back">← Back to Home</a>
  </div>
</nav>

<main class="dashboard">

  <!-- Loading state while we check auth -->
  <div id="loading" class="loading">Checking session…</div>

  <!-- Login view -->
  <section id="login-view" class="hidden">
    <form class="login-card" id="login-form" autocomplete="on">
      <h2>🔒 Sign in</h2>
      <p class="subtitle">This dashboard is private. Sign in to continue.</p>

      <div class="login-field">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" name="email" required autocomplete="username" placeholder="you@example.com">
      </div>

      <div class="login-field">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" name="password" required autocomplete="current-password" placeholder="••••••••">
      </div>

      <div class="login-error" id="login-error"></div>

      <button class="login-submit" id="login-submit" type="submit">Sign in</button>
      <button class="login-forgot" id="login-forgot" type="button">Forgot password?</button>

      <p class="login-info">Access is invite-only. New accounts cannot self-register.</p>
    </form>
  </section>

  <!-- Authenticated view -->
  <section id="app-view" class="hidden" style="display: contents;">
    <div class="dashboard-header">
      <h1>Your TusaBot</h1>
      <p>Your personal AI assistant</p>
    </div>

    <div class="chat-container">
      <div class="chat-messages" id="chat-messages">
        <div class="chat-placeholder" id="chat-placeholder">
          <span>🤖 Your bot is ready</span>
        </div>
      </div>
      <div class="chat-input-area">
        <input type="text" class="chat-input" id="chat-input" placeholder="Type a message..." autocomplete="off">
        <button class="chat-send-btn" id="chat-send">Send</button>
      </div>
    </div>
  </section>
</main>

<footer>
  <p>TusaBots © 2026</p>
</footer>

<script type="module">
import {
  login,
  logout,
  getUser,
  requestPasswordRecovery,
  handleAuthCallback,
  updateUser,
  onAuthChange,
  AUTH_EVENTS,
  AuthError,
  MissingIdentityError,
} from 'https://esm.sh/@netlify/identity@latest'

const loadingEl = document.getElementById('loading')
const loginView = document.getElementById('login-view')
const appView = document.getElementById('app-view')
const navUser = document.getElementById('nav-user')
const navUserEmail = document.getElementById('nav-user-email')
const navLogout = document.getElementById('nav-logout')

const loginForm = document.getElementById('login-form')
const emailInput = document.getElementById('login-email')
const passwordInput = document.getElementById('login-password')
const loginSubmit = document.getElementById('login-submit')
const loginError = document.getElementById('login-error')
const loginForgot = document.getElementById('login-forgot')

const messagesEl = document.getElementById('chat-messages')
const placeholder = document.getElementById('chat-placeholder')
const chatInput = document.getElementById('chat-input')
const chatSend = document.getElementById('chat-send')

let recoveryUser = null

function showLogin() {
  loadingEl.classList.add('hidden')
  appView.classList.add('hidden')
  loginView.classList.remove('hidden')
  navUser.classList.add('hidden')
  navLogout.classList.add('hidden')
}

function showApp(user) {
  loadingEl.classList.add('hidden')
  loginView.classList.add('hidden')
  appView.classList.remove('hidden')
  navUserEmail.textContent = user.email ?? user.user_metadata?.full_name ?? 'you'
  navUser.classList.remove('hidden')
  navLogout.classList.remove('hidden')
}

function setError(message) {
  loginError.textContent = message ?? ''
}

async function bootstrap() {
  try {
    const callback = await handleAuthCallback()
    if (callback?.type === 'recovery') {
      recoveryUser = callback.user
      passwordInput.value = ''
      passwordInput.placeholder = 'New password'
      loginSubmit.textContent = 'Set new password'
      emailInput.value = callback.user?.email ?? ''
      emailInput.disabled = true
      setError('Enter a new password to finish recovery.')
      showLogin()
      return
    }
  } catch (error) {
    if (error instanceof AuthError) {
      setError(error.message)
    }
  }

  const user = await getUser()
  if (user) {
    showApp(user)
  } else {
    showLogin()
  }
}

onAuthChange((event, user) => {
  if (event === AUTH_EVENTS.LOGOUT) {
    showLogin()
  } else if (event === AUTH_EVENTS.LOGIN && user) {
    showApp(user)
  }
})

loginForm.addEventListener('submit', async (e) => {
  e.preventDefault()
  setError('')
  loginSubmit.disabled = true

  try {
    if (recoveryUser) {
      const newPassword = passwordInput.value
      if (!newPassword || newPassword.length < 8) {
        setError('Password must be at least 8 characters.')
        return
      }
      await updateUser({ password: newPassword })
      recoveryUser = null
      emailInput.disabled = false
      passwordInput.placeholder = '••••••••'
      loginSubmit.textContent = 'Sign in'
      const user = await getUser()
      if (user) showApp(user)
      return
    }

    const user = await login(emailInput.value.trim(), passwordInput.value)
    showApp(user)
  } catch (error) {
    if (error instanceof MissingIdentityError) {
      setError('Identity is not enabled yet. Deploy this site (or run `netlify dev`) to activate it.')
    } else if (error instanceof AuthError) {
      switch (error.status) {
        case 401:
          setError('Invalid email or password.')
          break
        case 422:
          setError('Invalid input. Check your email and password.')
          break
        default:
          setError(error.message)
      }
    } else {
      setError('Unexpected error. Try again.')
    }
  } finally {
    loginSubmit.disabled = false
  }
})

loginForgot.addEventListener('click', async () => {
  setError('')
  const email = emailInput.value.trim()
  if (!email) {
    setError('Enter your email above first, then click "Forgot password?".')
    return
  }
  try {
    await requestPasswordRecovery(email)
    setError('') // clear any error
    loginError.style.color = 'var(--accent-green)'
    loginError.textContent = 'Recovery email sent. Check your inbox.'
    setTimeout(() => { loginError.style.color = '' }, 6000)
  } catch (error) {
    if (error instanceof AuthError) setError(error.message)
  }
})

navLogout.addEventListener('click', async () => {
  try {
    await logout()
  } catch (error) {
    // best-effort logout; UI updates on auth event
  }
  showLogin()
})

/* ===== Chat (placeholder, only visible when logged in) ===== */
const botReplies = [
  "I'm here! This is a placeholder — full AI coming soon. 🚀",
  "Great question! Backend integration is on the way. ✨",
  "Beep boop! I can't think yet, but I will soon. 🤖",
  "Stay tuned — real conversations are coming! 🌟",
  "Noted! Once I'm connected, I'll be much smarter. 🧠",
]

function addBubble(text, type) {
  if (placeholder && placeholder.parentNode) placeholder.remove()
  const div = document.createElement('div')
  div.className = 'chat-bubble ' + type
  div.textContent = text
  messagesEl.appendChild(div)
  messagesEl.scrollTop = messagesEl.scrollHeight
}

function sendMessage() {
  const text = chatInput.value.trim()
  if (!text) return
  chatInput.value = ''
  addBubble(text, 'user')
  setTimeout(() => {
    addBubble(botReplies[Math.floor(Math.random() * botReplies.length)], 'bot')
  }, 600)
}

chatSend.addEventListener('click', sendMessage)
chatInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendMessage()
})

bootstrap()
</script>

</body>
</html>
